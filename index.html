<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Shore House</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAUaf53h7A0sDZBV6hk63IBPJSkIjJgP-M",
    authDomain: "shore-house-adffe.firebaseapp.com",
    databaseURL: "https://shore-house-adffe-default-rtdb.firebaseio.com",
    projectId: "shore-house-adffe",
    storageBucket: "shore-house-adffe.firebasestorage.app",
    messagingSenderId: "195343178767",
    appId: "1:195343178767:web:854cb1d55334ce42d2d77a",
    measurementId: "G-MW3ZLBP6EB"
  };

  const SHORE_ADDRESS = "1932 Seaman Court, Toms River, NJ";
  const TOTAL_ROOMS = 12;

  const COUPLES = [
    { id: "parents",  label: "Mom & Dad",       rooms: 1, locked: true  },
    { id: "rob",      label: "Rob & Jess",      rooms: 3, locked: false },
    { id: "erin",     label: "Erin & Mike",     rooms: 2, locked: false },
    { id: "lauren",   label: "Lauren & Oscar",  rooms: 1, locked: false },
    { id: "justin",   label: "Justin & Alex",   rooms: 1, locked: false },
    { id: "connor",   label: "Connor & Sophie", rooms: 1, locked: false },
  ];

  function generateWeekends() {
    const weekends = [];
    const monNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep"];
    let d = new Date(2026, 4, 22);
    const labor = new Date(2026, 8, 4);
    let i = 0;
    while (d <= labor) {
      const fri = new Date(d);
      const sun = new Date(fri); sun.setDate(fri.getDate() + 2);
      const mon = new Date(fri); mon.setDate(fri.getDate() + 3);
      weekends.push({
        id: `wk_${fri.toISOString().slice(0,10)}`,
        label: `${monNames[fri.getMonth()]} ${fri.getDate()}\u2013${sun.getDate()}`,
        friDate: fri.toISOString().slice(0,10),
        monDate: mon.toISOString().slice(0,10),
        badge: i === 0 ? "Memorial Day" : d >= labor ? "Labor Day" : null,
      });
      d.setDate(d.getDate() + 7); i++;
    }
    return weekends;
  }

  const WEEKENDS = generateWeekends();

  let db, isFirebaseConnected = false;
  let currentUser = localStorage.getItem("shoreHouseUser") || null;
  let appData = {}, invitesData = {};
  const urlParams = new URLSearchParams(window.location.search);
  const inviteId = urlParams.get("invite");

  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    isFirebaseConnected = true;
    onValue(ref(db, "shoreHouse2026"), snap => { appData = snap.val() || {}; if (!inviteId) renderGrid(); });
    onValue(ref(db, "invites2026"), snap => { invitesData = snap.val() || {}; if (inviteId) renderInvitePage(); else renderGrid(); });
  } catch(e) {
    console.warn("Firebase not configured", e);
    if (inviteId) renderInvitePage(); else renderGrid();
  }

  function writeData(path, value) { if (isFirebaseConnected) set(ref(db, path), value); }

  function getLabelById(id) { return COUPLES.find(c => c.id === id)?.label || id; }
  function getInitials(id) { const l = getLabelById(id); const p = l.split(" & "); return (p[0][0] + (p[1]?.[0] || "")).toUpperCase(); }
  function getWeekendById(id) { return WEEKENDS.find(w => w.id === id); }

  function getStatus(wkId, coupleId) { return ((appData[wkId] || {}).statuses || {})[coupleId] || "tbd"; }

  function getAllGuests(wkId) {
    const manual = (appData[wkId] || {}).guests || {};
    const invited = (appData[wkId] || {}).invitedGuests || {};
    const out = [];
    Object.entries(manual).forEach(([k,g]) => out.push({key:k, type:"manual", ...g}));
    Object.entries(invited).forEach(([k,g]) => out.push({key:k, type:"invited", ...g}));
    return out;
  }

  function getRoomsUsed(wkId) {
    const statuses = (appData[wkId] || {}).statuses || {};
    let rooms = 1;
    COUPLES.filter(c => !c.locked).forEach(c => { if (statuses[c.id] === "yes") rooms += c.rooms; });
    getAllGuests(wkId).forEach(g => { rooms += (parseInt(g.rooms) || 0); });
    return rooms;
  }

  function buildCalUrl(wk) {
    const s = wk.friDate.replace(/-/g,""), e = wk.monDate.replace(/-/g,"");
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Shore House Weekend \uD83C\uDF0A")}&dates=${s}/${e}&details=${encodeURIComponent("Join us at the shore house!\n\n" + SHORE_ADDRESS)}&location=${encodeURIComponent(SHORE_ADDRESS)}`;
  }

  // ── INVITE PAGE ──────────────────────────────────────────────
  function renderInvitePage() {
    const container = document.getElementById("app");
    const invite = invitesData[inviteId];
    if (!invite) {
      container.innerHTML = `<div class="invite-screen"><div class="invite-box"><div class="wave-line large">&#12316;&#12316;&#12316;&#12316;&#12316;</div><h1 class="picker-title">Shore House</h1><p class="invite-from" style="opacity:0.5;margin-top:20px;">This invite link is invalid or has expired.</p></div></div>`;
      return;
    }
    if (invite.accepted) {
      const wk = getWeekendById(invite.acceptedWeekend);
      container.innerHTML = `<div class="invite-screen"><div class="invite-box"><div class="wave-line large">&#12316;&#12316;&#12316;&#12316;&#12316;</div><h1 class="picker-title">Shore House</h1><p class="invite-from">You're all set! &#127881;</p><p class="invite-address">Already accepted for <strong>${wk?.label || "a weekend"}</strong></p>${wk ? `<a href="${buildCalUrl(wk)}" target="_blank" class="cal-btn">&#128197; Add to Google Calendar</a>` : ''}</div></div>`;
      return;
    }
    const offered = (invite.weekendIds || []).map(id => getWeekendById(id)).filter(Boolean);
    container.innerHTML = `
      <div class="invite-screen"><div class="invite-box">
        <div class="wave-line large">&#12316;&#12316;&#12316;&#12316;&#12316;</div>
        <h1 class="picker-title">Shore House</h1>
        <p class="invite-sub">Summer 2026</p>
        <p class="invite-from"><strong>${getLabelById(invite.invitedBy)}</strong> is inviting you down to the shore!</p>
        <p class="invite-address">&#128205; ${SHORE_ADDRESS}</p>
        <p class="invite-pick-label">Pick a weekend</p>
        <div class="invite-weekends" id="invite-weekends">
          ${offered.map(wk => `
            <button class="invite-wk-btn" data-wkid="${wk.id}" onclick="selectInviteWeekend('${wk.id}')">
              ${wk.badge ? `<span class="invite-badge">${wk.badge}</span>` : ''}
              <span class="invite-wk-label">${wk.label}</span>
            </button>`).join('')}
        </div>
        <div id="invite-confirm-area"></div>
      </div></div>`;
  }

  window.selectInviteWeekend = function(wkId) {
    document.querySelectorAll('.invite-wk-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`.invite-wk-btn[data-wkid="${wkId}"]`)?.classList.add('selected');
    const wk = getWeekendById(wkId);
    const invite = invitesData[inviteId];
    document.getElementById('invite-confirm-area').innerHTML = `
      <div class="invite-confirm">
        <p class="invite-confirm-text">Weekend of <strong>${wk.label}</strong> with <strong>${getLabelById(invite?.invitedBy)}</strong></p>
        <button class="invite-accept-btn" onclick="confirmInviteAccept('${wkId}')">&#10003; Accept &amp; Confirm</button>
      </div>`;
  };

  window.confirmInviteAccept = function(wkId) {
    const invite = invitesData[inviteId];
    if (!invite) return;
    writeData(`invites2026/${inviteId}/accepted`, true);
    writeData(`invites2026/${inviteId}/acceptedWeekend`, wkId);
    const guestKey = `i_${inviteId}`;
    writeData(`shoreHouse2026/${wkId}/invitedGuests/${guestKey}`, {
      names: invite.guestNames, rooms: invite.rooms, addedBy: invite.invitedBy, inviteKey: inviteId, type: "invited"
    });
    const wk = getWeekendById(wkId);
    document.getElementById('invite-confirm-area').innerHTML = `
      <div class="invite-accepted">
        <p class="accepted-msg">&#127881; You're confirmed for <strong>${wk.label}</strong>!</p>
        <a href="${buildCalUrl(wk)}" target="_blank" class="cal-btn">&#128197; Add to Google Calendar</a>
        <p class="cal-note">Opens Google Calendar with the event pre-filled</p>
      </div>`;
    document.querySelectorAll('.invite-wk-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.4'; });
  };

  // ── MAIN GRID ────────────────────────────────────────────────
  function renderGrid() {
    const container = document.getElementById("app");
    if (!container || inviteId) return;
    if (!currentUser) { renderUserPicker(container); return; }
    const activeCouples = COUPLES.filter(c => !c.locked);

    let html = `
      <header><div class="header-inner"><div class="header-top">
        <div class="title-block">
          <div class="wave-line">&#12316;&#12316;&#12316;</div>
          <h1>Shore House</h1>
          <div class="subtitle">Summer 2026</div>
        </div>
        <button class="user-btn" onclick="switchUser()">
          <span class="user-avatar">${getInitials(currentUser)}</span>
          <span class="user-name">${getLabelById(currentUser)}</span>
          <span class="caret">&#9662;</span>
        </button>
      </div>
      ${!isFirebaseConnected ? `<div class="demo-banner">&#9888;&#65039; Demo Mode &mdash; Firebase not connected</div>` : ''}
      </div></header>
      <main>
        <div class="legend">
          <span class="leg yes">&#10003; Coming</span>
          <span class="leg no">&#10007; Not Coming</span>
          <span class="leg tbd">? TBD</span>
        </div>
        <div class="weekends-list">`;

    WEEKENDS.forEach(wk => {
      const roomsUsed = getRoomsUsed(wk.id);
      const roomPct = Math.min(roomsUsed / TOTAL_ROOMS, 1);
      const roomColor = roomsUsed >= TOTAL_ROOMS ? '#e05a5a' : roomsUsed >= 10 ? '#e8a44b' : '#4a9b78';
      const guests = getAllGuests(wk.id);

      html += `
        <div class="weekend-card${wk.badge ? ' has-badge' : ''}">
          <div class="weekend-header">
            <div class="weekend-date">
              ${wk.badge ? `<span class="holiday-badge">${wk.badge}</span>` : ''}
              <span class="date-label">${wk.label}</span>
            </div>
            <div class="room-meter">
              <div class="room-bar-wrap"><div class="room-bar" style="width:${roomPct*100}%;background:${roomColor}"></div></div>
              <span class="room-count" style="color:${roomColor}">${roomsUsed}/${TOTAL_ROOMS} rooms</span>
            </div>
          </div>
          <div class="couples-grid">`;

      activeCouples.forEach(c => {
        const status = getStatus(wk.id, c.id);
        const isMe = c.id === currentUser;
        const [first, second] = c.label.split(" & ");
        html += `
          <div class="couple-cell${isMe ? ' is-me' : ''}">
            <div class="couple-name">${first}<br><span class="amp">&amp;</span> ${second}</div>
            <div class="status-btns">
              <button class="status-btn${status==='yes'?' active yes':''}" onclick="setStatusUI('${wk.id}','${c.id}','yes')" ${!isMe?'disabled':''}>&#10003;</button>
              <button class="status-btn${status==='no'?' active no':''}" onclick="setStatusUI('${wk.id}','${c.id}','no')" ${!isMe?'disabled':''}>&#10007;</button>
              <button class="status-btn${status==='tbd'?' active tbd':''}" onclick="setStatusUI('${wk.id}','${c.id}','tbd')" ${!isMe?'disabled':''}>?</button>
            </div>
          </div>`;
      });

      html += `</div><div class="guests-section">`;

      if (guests.length > 0) {
        html += `<div class="guest-header-label">Guests</div><div class="guest-chips">`;
        guests.forEach(g => {
          const names = Array.isArray(g.names) ? g.names.join(", ") : (g.names || g.name || "Guest");
          const ownerLabel = getLabelById(g.addedBy);
          const rooms = parseInt(g.rooms) || 0;
          html += `
            <div class="guest-chip${g.type==='invited'?' invited':' manual'}" ondblclick="editGuestUI('${wk.id}','${g.key}','${g.type}')" title="Double-tap to edit">
              <div class="guest-chip-main">
                <span class="guest-names">${names}</span>
                <span class="guest-meta">${ownerLabel}'s guest &middot; ${rooms} room${rooms!==1?'s':''} <span class="edit-hint">✎</span></span>
              </div>
              <button class="guest-remove" onclick="removeGuestUI('${wk.id}','${g.key}','${g.type}')">&#215;</button>
            </div>`;
        });
        html += `</div>`;
      }

      html += `
        <div class="guest-actions">
          <button class="add-guest-btn" onclick="openManualGuestModal('${wk.id}','${wk.label}')">+ Add Guest</button>
          <button class="invite-btn" onclick="openInviteModal('${wk.id}')">&#9993; Invite</button>
        </div>
      </div></div>`;
    });

    html += `</div></main>
      <div id="modal-overlay" class="modal-overlay">
        <div class="modal" onclick="event.stopPropagation()"><div id="modal-content"></div></div>
      </div>`;

    container.innerHTML = html;
  }

  function renderUserPicker(container) {
    container.innerHTML = `
      <div class="picker-screen"><div class="picker-inner">
        <div class="wave-line large">&#12316;&#12316;&#12316;&#12316;&#12316;</div>
        <h1 class="picker-title">Shore House</h1>
        <p class="picker-sub">Summer 2026</p>
        <p class="picker-prompt">Who are you?</p>
        <div class="picker-grid">
          ${COUPLES.filter(c=>!c.locked).map(c=>`
            <button class="picker-btn" onclick="selectUser('${c.id}')">
              <span class="picker-initials">${getInitials(c.id)}</span>
              <span class="picker-label">${c.label}</span>
            </button>`).join('')}
        </div>
      </div></div>`;
  }

  // ── MODALS ───────────────────────────────────────────────────
  window.openManualGuestModal = function(wkId, label) {
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-content').innerHTML = `
      <h3 class="modal-title">Add Guest</h3>
      <p class="modal-wk">${label}</p>
      <label class="field-label">Guest name(s) <span class="field-hint">one per line</span></label>
      <textarea id="g-names" class="guest-textarea" rows="3" placeholder="John Smith&#10;Jane Smith&#10;Emma Smith"></textarea>
      <label class="field-label">Rooms needed</label>
      <div class="rooms-stepper">
        <button class="stepper-btn" onclick="stepCount('g-rooms',-1)">&#8722;</button>
        <span id="g-rooms">1</span>
        <button class="stepper-btn" onclick="stepCount('g-rooms',1)">+</button>
      </div>
      <label class="field-label">Hosted by</label>
      <select id="g-host" class="field-select">
        ${COUPLES.filter(c=>!c.locked).map(c=>`<option value="${c.id}"${c.id===currentUser?' selected':''}>${c.label}</option>`).join('')}
      </select>
      <div class="modal-btns" style="margin-top:18px;">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="submitManualGuest('${wkId}')">Add Guest</button>
      </div>`;
  };

  window.submitManualGuest = function(wkId) {
    const names = (document.getElementById('g-names')?.value||'').split('\n').map(n=>n.trim()).filter(Boolean);
    const rooms = parseInt(document.getElementById('g-rooms')?.textContent)||1;
    const addedBy = document.getElementById('g-host')?.value || currentUser;
    if (!names.length) return;
    const key = `m_${Date.now()}`;
    const payload = { names, rooms, addedBy, type:"manual" };
    if (!isFirebaseConnected) { appData[wkId]=appData[wkId]||{}; appData[wkId].guests=appData[wkId].guests||{}; appData[wkId].guests[key]=payload; renderGrid(); }
    else writeData(`shoreHouse2026/${wkId}/guests/${key}`, payload);
    closeModal();
  };

  window.editGuestUI = function(wkId, guestKey, guestType) {
    // Find the guest data
    const guestData = guestType === 'invited'
      ? ((appData[wkId] || {}).invitedGuests || {})[guestKey]
      : ((appData[wkId] || {}).guests || {})[guestKey];
    if (!guestData) return;

    const names = Array.isArray(guestData.names) ? guestData.names.join('\n') : (guestData.names || guestData.name || '');
    const rooms = parseInt(guestData.rooms) || 1;
    const addedBy = guestData.addedBy || currentUser;

    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-content').innerHTML = `
      <h3 class="modal-title">Edit Guest</h3>
      <p class="modal-wk">${guestType === 'invited' ? 'Invited guest' : 'Manual guest'}</p>
      <label class="field-label">Guest name(s) <span class="field-hint">one per line</span></label>
      <textarea id="eg-names" class="guest-textarea" rows="3">${names}</textarea>
      <label class="field-label">Rooms needed</label>
      <div class="rooms-stepper">
        <button class="stepper-btn" onclick="stepCount('eg-rooms',-1)">&#8722;</button>
        <span id="eg-rooms">${rooms}</span>
        <button class="stepper-btn" onclick="stepCount('eg-rooms',1)">+</button>
      </div>
      <label class="field-label">Hosted by</label>
      <select id="eg-host" class="field-select">
        ${COUPLES.filter(c=>!c.locked).map(c=>`<option value="${c.id}"${c.id===addedBy?' selected':''}>${c.label}</option>`).join('')}
      </select>
      <div class="modal-btns" style="margin-top:18px;">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="saveGuestEdit('${wkId}','${guestKey}','${guestType}')">Save Changes</button>
      </div>`;
  };

  window.saveGuestEdit = function(wkId, guestKey, guestType) {
    const names = (document.getElementById('eg-names')?.value||'').split('\n').map(n=>n.trim()).filter(Boolean);
    const rooms = parseInt(document.getElementById('eg-rooms')?.textContent)||1;
    const addedBy = document.getElementById('eg-host')?.value || currentUser;
    if (!names.length) return;
    const path = guestType === 'invited'
      ? `shoreHouse2026/${wkId}/invitedGuests/${guestKey}`
      : `shoreHouse2026/${wkId}/guests/${guestKey}`;
    const payload = { names, rooms, addedBy, type: guestType };
    if (guestType === 'invited') payload.inviteKey = guestKey.replace('i_','');
    if (!isFirebaseConnected) {
      const store = guestType === 'invited' ? (appData[wkId].invitedGuests||{}) : (appData[wkId].guests||{});
      store[guestKey] = payload;
      renderGrid();
    } else {
      writeData(path, payload);
    }
    closeModal();
  };

  let inviteWkIds = new Set();

  window.openInviteModal = function(defaultWkId) {
    inviteWkIds = new Set([defaultWkId]);
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('modal-content').innerHTML = `
      <h3 class="modal-title">Invite Guests</h3>
      <p class="modal-wk">Create a shareable invite link</p>
      <label class="field-label">Guest name(s) <span class="field-hint">one per line</span></label>
      <textarea id="i-names" class="guest-textarea" rows="3" placeholder="John Smith&#10;Jane Smith"></textarea>
      <label class="field-label">Rooms needed</label>
      <div class="rooms-stepper">
        <button class="stepper-btn" onclick="stepCount('i-rooms',-1)">&#8722;</button>
        <span id="i-rooms">1</span>
        <button class="stepper-btn" onclick="stepCount('i-rooms',1)">+</button>
      </div>
      <label class="field-label">Offer these weekends <span class="field-hint">guest picks one</span></label>
      <div class="wk-checkbox-list">
        ${WEEKENDS.map(wk=>`
          <label class="wk-check-row${wk.id===defaultWkId?' checked':''}" id="wkrow_${wk.id}">
            <input type="checkbox" class="wk-checkbox" value="${wk.id}" ${wk.id===defaultWkId?'checked':''}
              onchange="toggleInviteWk('${wk.id}',this.checked)">
            <span class="wk-check-text">${wk.badge?`<em>${wk.badge}</em> &middot; `:''}${wk.label}</span>
          </label>`).join('')}
      </div>
      <div class="modal-btns" style="margin-top:18px;">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-confirm" onclick="generateInviteLink()">Generate Link</button>
      </div>
      <div id="invite-link-result"></div>`;
  };

  window.toggleInviteWk = function(wkId, checked) {
    checked ? inviteWkIds.add(wkId) : inviteWkIds.delete(wkId);
    document.getElementById(`wkrow_${wkId}`)?.classList.toggle('checked', checked);
  };

  window.generateInviteLink = function() {
    const guestNames = (document.getElementById('i-names')?.value||'').split('\n').map(n=>n.trim()).filter(Boolean);
    const rooms = parseInt(document.getElementById('i-rooms')?.textContent)||1;
    const weekendIds = [...inviteWkIds];
    const resultEl = document.getElementById('invite-link-result');
    if (!guestNames.length) {
      resultEl.innerHTML = `<p class="inline-error">Please enter at least one guest name.</p>`;
      return;
    }
    if (!weekendIds.length) {
      resultEl.innerHTML = `<p class="inline-error">Please select at least one weekend.</p>`;
      return;
    }
    const payload = { invitedBy: currentUser, guestNames, rooms, weekendIds, createdAt: Date.now(), accepted: false };
    const key = `inv_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    if (isFirebaseConnected) writeData(`invites2026/${key}`, payload);
    const link = `${window.location.origin}${window.location.pathname}?invite=${key}`;
    // Auto-copy immediately
    try { navigator.clipboard.writeText(link); } catch(e) { const t=document.createElement('textarea');t.value=link;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); }
    resultEl.innerHTML = `
      <div class="invite-result">
        <p class="invite-result-label">&#128204; Link copied to clipboard!</p>
        <div class="invite-link-box">
          <span class="invite-link-text">${link}</span>
          <button class="copy-btn" onclick="copyLink('${link}')">Copy Again</button>
        </div>
        <p class="invite-result-hint">Guest picks a weekend and confirms &mdash; it shows up in the app automatically.</p>
      </div>`;
  };

  window.copyLink = function(link) {
    navigator.clipboard?.writeText(link).catch(()=>{}).finally(()=>{});
    try { navigator.clipboard.writeText(link); } catch(e) { const t=document.createElement('textarea'); t.value=link; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = "Copied!"; setTimeout(()=>btn.textContent="Copy", 2000); }
  };

  window.stepCount = function(elId, delta) {
    const el = document.getElementById(elId);
    if (el) el.textContent = Math.max(1, Math.min(6, (parseInt(el.textContent)||1) + delta));
  };

  window.setStatusUI = (wkId, coupleId, status) => {
    if (!isFirebaseConnected) { appData[wkId]=appData[wkId]||{}; appData[wkId].statuses=appData[wkId].statuses||{}; appData[wkId].statuses[coupleId]=status; renderGrid(); return; }
    writeData(`shoreHouse2026/${wkId}/statuses/${coupleId}`, status);
  };

  window.removeGuestUI = (wkId, key, type) => {
    const path = type==='invited' ? `shoreHouse2026/${wkId}/invitedGuests/${key}` : `shoreHouse2026/${wkId}/guests/${key}`;
    if (!isFirebaseConnected) { if(type==='invited') delete (appData[wkId]?.invitedGuests||{})[key]; else delete (appData[wkId]?.guests||{})[key]; renderGrid(); return; }
    writeData(path, null);
  };

  window.closeModal = () => document.getElementById('modal-overlay')?.classList.remove('open');
  window.selectUser = id => { currentUser = id; localStorage.setItem("shoreHouseUser", id); renderGrid(); };
  window.switchUser = () => { currentUser = null; localStorage.removeItem("shoreHouseUser"); renderGrid(); };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });
  document.addEventListener('click', e => {
    const overlay = document.getElementById('modal-overlay');
    if (overlay && overlay.classList.contains('open') && e.target === overlay) window.closeModal();
  });

  if (!isFirebaseConnected) { if (inviteId) renderInvitePage(); else renderGrid(); }
</script>

<style>
  :root {
    --navy:#1a2e4a; --navy-light:#243d60; --sand:#f5ede0; --sand-dark:#e8d9c4;

    background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8953a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}

  /* HEADER */

  .user-btn:hover{background:rgba(255,255,255,.18);}
  .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;}

  .caret{font-size:10px;opacity:.6;}
  .demo-banner{margin-top:8px;background:rgba(200,149,58,.2);border:1px solid rgba(200,149,58,.4);border-radius:6px;padding:6px 10px;font-size:12px;color:#f0d090;}

  /* MAIN */
  main{max-width:680px;margin:0 auto;padding:16px 12px 40px;}
  .legend{display:flex;gap:14px;margin-bottom:16px;padding:10px 14px;background:white;border-radius:10px;border:1px solid var(--sand-dark);}
  .leg{font-size:12px;font-weight:700;}
  .leg.yes{color:var(--yes);} .leg.no{color:var(--no);} .leg.tbd{color:var(--tbd);}

  /* WEEKEND CARDS */
  .weekends-list{display:flex;flex-direction:column;gap:14px;}

  .weekend-card.has-badge{border-color:var(--gold);}

  .weekend-date{display:flex;flex-direction:column;gap:2px;}
  .holiday-badge{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);}

  /* GUESTS */

  .edit-hint{font-size:10px;opacity:0;transition:opacity .2s;margin-left:2px;}
  .guest-chip.manual{background:#fdf8ee;border-color:#e8c87a;}
  .guest-chip.invited{background:#eef5f3;border-color:#9ecfc8;}
  .guest-chip-main{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .guest-names{font-size:13px;font-weight:700;color:var(--text);}

  .guest-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
  .add-guest-btn,.invite-btn{background:none;border:1.5px dashed var(--sand-dark);color:var(--muted);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Lato',sans-serif;}

  .invite-btn{border-color:#9ecfc8;color:var(--teal);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(26,46,74,.5);backdrop-filter:blur(3px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  @media(min-width:500px){.modal-overlay{align-items:center;padding:20px;}}
  .modal-overlay.open{display:flex;}
  .modal{background:white;border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.2);animation:slideUp .25s ease;}
  @media(min-width:500px){.modal{border-radius:18px;animation:popIn .2s ease;}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);margin-bottom:4px;}

  /* PICKER */

  .invite-accept-btn{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:13px 30px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;transition:opacity .2s;}
  .invite-accept-btn:hover{opacity:.85;}
  .invite-accepted{background:rgba(58,138,122,.15);border:1.5px solid #4a9b78;border-radius:12px;padding:20px;margin-top:4px;}
  .accepted-msg{color:white;font-size:16px;margin-bottom:14px;}
  .cal-btn{display:inline-block;background:white;color:var(--navy);border-radius:10px;padding:12px 22px;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:10px;transition:opacity .2s;}

  #app{min-height:100vh;}
</style>
</head>
